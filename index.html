<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新中特选择题刷题</title>
  <link rel="stylesheet" href="./styles.css?v=20260624-3">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>新中特选择题刷题</h1>
      <p id="summary">正在加载题库...</p>
    </div>
    <nav class="tabs" aria-label="功能">
      <button class="tab active" data-view="bank" type="button">所有题库</button>
      <button class="tab" data-view="quiz" type="button">随机出题</button>
      <button class="tab" data-view="short" type="button">简答题</button>
      <button class="tab" data-view="wrong" type="button">错题回看</button>
    </nav>
  </header>

  <main>
    <section id="bankView" class="view">
      <div class="toolbar">
        <input id="search" placeholder="搜索题干、选项、答案、来源" autocomplete="off">
        <select id="typeFilter" aria-label="题型">
          <option value="">全部题型</option>
          <option value="single">单选</option>
          <option value="multiple">多选</option>
          <option value="judgment">判断/回忆</option>
        </select>
        <select id="sourceFilter" aria-label="来源">
          <option value="">全部来源</option>
        </select>
        <button class="secondary" id="clearSearch" type="button">清空</button>
      </div>
      <p class="count" id="bankCount"></p>
      <div id="bankList" class="list"></div>
    </section>

    <section id="quizView" class="view hidden">
      <div class="quiz-head">
        <p class="count" id="score">已答 0 题，正确 0 题</p>
        <button id="nextQuestion" type="button">换一题</button>
      </div>
      <div id="quizCard"></div>
    </section>

    <section id="wrongView" class="view hidden">
      <div class="toolbar">
        <button class="secondary" id="clearWrong" type="button">清空错题</button>
      </div>
      <p class="count" id="wrongCount"></p>
      <div id="wrongList" class="list"></div>
    </section>

    <section id="shortView" class="view hidden">
      <div class="toolbar">
        <input id="shortSearch" placeholder="搜索简答题题目、答案、章节" autocomplete="off">
        <select id="chapterFilter" aria-label="章节">
          <option value="">全部章节</option>
        </select>
        <button class="secondary" id="clearShortSearch" type="button">清空</button>
        <button id="randomShort" type="button">随机下一题</button>
      </div>
      <p class="count" id="shortCount"></p>
      <div id="shortList" class="list"></div>
    </section>
  </main>

  <script src="./data.js?v=20260628-1"></script>
  <script src="./shorts.js?v=20260628-1"></script>
  <script src="./app.js?v=20260628-1"></script>
</body>
</html>
